name: Deploy EKS

on:
  push:
    tags:
      - "cdk-stack-eks-[0-9]*"
    paths:
      - "src/move37/infra/eks/**"
      - "src/move37/api/**"
      - "src/move37/db/**"
      - "src/move37/web/**"
      - "src/move37/models/**"
      - "src/move37/repositories/**"
      - "src/move37/schemas/**"
      - "src/move37/services/**"
      - "src/move37/alembic.ini"
      - "src/move37/alembic/**"
      - "src/move37/otel/**"
      - "src/move37/prometheus/**"
      - "src/move37/loki/**"
      - "src/move37/promtail/**"
      - "src/move37/grafana/**"
      - "src/move37/default_graph.py"
      - "src/move37/bank_account.py"
      - "src/move37/calendar.py"
      - "src/move37/github.py"
      - "src/move37/__init__.py"
      - ".github/workflows/deploy-eks.yml"
  workflow_run:
    workflows:
      - Deploy Web Container
    types:
      - completed

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: deploy-eks-${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      VPC_ID: ${{ secrets.VPC_ID }}
      EKS_CLUSTER_SUBNET_IDS: ${{ vars.EKS_CLUSTER_SUBNET_IDS }}
      WEB_STANDALONE_DEBUG: ${{ vars.WEB_STANDALONE_DEBUG || 'false' }}
      EKS_GHCR_PULL_USERNAME: ${{ secrets.EKS_GHCR_PULL_USERNAME }}
      EKS_GHCR_PULL_TOKEN: ${{ secrets.EKS_GHCR_PULL_TOKEN }}

    defaults:
      run:
        shell: bash
        working-directory: src/move37/infra/eks

    steps:
      - name: Checkout (Push Trigger)
        if: github.event_name == 'push'
        uses: actions/checkout@v4

      - name: Checkout (Web Rollout Trigger)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download web release metadata artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: deploy-web-metadata
          path: src/move37/infra/eks
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION_SUFFIX=""
          TAG_KIND=""
          IMAGE_TAG=""
          DEPLOY_ENV=""
          CLUSTER_NAME=""
          NAMESPACE=""

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            test -f deploy-web-metadata.json || { echo "deploy-web-metadata.json not found" >&2; exit 1; }

            IMAGE_TAG="$(jq -r '.image_tag' deploy-web-metadata.json)"
            TARGET_BRANCH="$(jq -r '.target_branch' deploy-web-metadata.json)"

            [[ -n "$IMAGE_TAG" && "$IMAGE_TAG" != "null" ]] || { echo "Missing image_tag in metadata" >&2; exit 1; }
            [[ -n "$TARGET_BRANCH" && "$TARGET_BRANCH" != "null" ]] || { echo "Missing target_branch in metadata" >&2; exit 1; }

            TAG_KIND="web-rollout"

            case "$TARGET_BRANCH" in
              dev)
                DEPLOY_ENV="dev"
                CLUSTER_NAME="move37-eks-dev"
                NAMESPACE="move37-dev"
                ;;
              beta)
                DEPLOY_ENV="beta"
                CLUSTER_NAME="move37-eks-beta"
                NAMESPACE="move37-beta"
                ;;
              rc)
                DEPLOY_ENV="rc"
                CLUSTER_NAME="move37-eks-rc"
                NAMESPACE="move37-rc"
                ;;
              latest)
                DEPLOY_ENV="prod"
                CLUSTER_NAME="move37-eks-prod"
                NAMESPACE="move37-prod"
                ;;
              *)
                echo "Unsupported target_branch in metadata: $TARGET_BRANCH" >&2
                exit 1
                ;;
            esac
          else
            TAG="${GITHUB_REF_NAME}"
            if [[ "$TAG" =~ ^cdk-stack-eks-([0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+(\.[0-9]+)?)?)$ ]]; then
              TAG_KIND="infra"
              VERSION_SUFFIX="${BASH_REMATCH[1]}"
            else
              echo "Unsupported tag format: $TAG" >&2
              exit 1
            fi

            IMAGE_TAG="${VERSION_SUFFIX}"

            if [[ "$VERSION_SUFFIX" =~ ^[0-9]+\.[0-9]+\.[0-9]+-b\.[0-9]+$ ]]; then
              DEPLOY_ENV="dev"
              CLUSTER_NAME="move37-eks-dev"
              NAMESPACE="move37-dev"
            elif [[ "$VERSION_SUFFIX" =~ ^[0-9]+\.[0-9]+\.[0-9]+-a\.[0-9]+$ ]]; then
              DEPLOY_ENV="beta"
              CLUSTER_NAME="move37-eks-beta"
              NAMESPACE="move37-beta"
            elif [[ "$VERSION_SUFFIX" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
              DEPLOY_ENV="rc"
              CLUSTER_NAME="move37-eks-rc"
              NAMESPACE="move37-rc"
            elif [[ "$VERSION_SUFFIX" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              DEPLOY_ENV="prod"
              CLUSTER_NAME="move37-eks-prod"
              NAMESPACE="move37-prod"
            else
              echo "Unsupported version suffix in tag: $TAG" >&2
              exit 1
            fi
          fi

          echo "stack_version=$VERSION_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "tag_kind=$TAG_KIND" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Apply stack version from tag
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if grep -qE '^eks:' stack-version.yaml; then
            sed -E -i.bak "s/^eks:.*/eks: ${{ steps.meta.outputs.stack_version }}/" stack-version.yaml
            rm -f stack-version.yaml.bak
          else
            echo "eks: ${{ steps.meta.outputs.stack_version }}" >> stack-version.yaml
          fi
          cat stack-version.yaml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Validate network configuration
        run: |
          set -euo pipefail
          if [[ -z "${VPC_ID:-}" ]]; then
            echo "Missing repository secret VPC_ID." >&2
            exit 1
          fi
          if [[ -z "${EKS_CLUSTER_SUBNET_IDS:-}" ]]; then
            echo "Missing repository variable EKS_CLUSTER_SUBNET_IDS." >&2
            exit 1
          fi
          mapfile -t subnet_ids < <(echo "${EKS_CLUSTER_SUBNET_IDS}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')
          if [[ "${#subnet_ids[@]}" -lt 2 ]]; then
            echo "EKS_CLUSTER_SUBNET_IDS must contain at least two subnet IDs." >&2
            exit 1
          fi
          for subnet_id in "${subnet_ids[@]}"; do
            if [[ ! "${subnet_id}" =~ ^subnet-[a-z0-9]+$ ]]; then
              echo "Invalid subnet ID '${subnet_id}' in EKS_CLUSTER_SUBNET_IDS." >&2
              exit 1
            fi
          done
          if [[ "${WEB_STANDALONE_DEBUG}" != "true" && "${WEB_STANDALONE_DEBUG}" != "false" ]]; then
            echo "Invalid WEB_STANDALONE_DEBUG='${WEB_STANDALONE_DEBUG}'." >&2
            exit 1
          fi
          if [[ -z "${EKS_GHCR_PULL_USERNAME:-}" ]]; then
            echo "Missing repository secret EKS_GHCR_PULL_USERNAME." >&2
            exit 1
          fi
          if [[ -z "${EKS_GHCR_PULL_TOKEN:-}" ]]; then
            echo "Missing repository secret EKS_GHCR_PULL_TOKEN." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Deploy EKS stack
        env:
          MOVE37_DEPLOY_ENV: ${{ steps.meta.outputs.deploy_env }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.meta.outputs.tag_kind }}" == "web-rollout" ]]; then
            npm run deploy -- \
              Move37EksStack \
              --require-approval never \
              --parameters Namespace="${{ steps.meta.outputs.namespace }}" \
              --parameters WebStandaloneDebug="${WEB_STANDALONE_DEBUG}" \
              --parameters GhcrPullUsername="${EKS_GHCR_PULL_USERNAME}" \
              --parameters GhcrPullToken="${EKS_GHCR_PULL_TOKEN}" \
              --parameters WebImage="ghcr.io/${{ github.repository_owner }}/move37-web:${{ steps.meta.outputs.image_tag }}"
          else
            npm run deploy -- \
              Move37EksStack \
              --require-approval never \
              --parameters Namespace="${{ steps.meta.outputs.namespace }}" \
              --parameters WebStandaloneDebug="${WEB_STANDALONE_DEBUG}" \
              --parameters GhcrPullUsername="${EKS_GHCR_PULL_USERNAME}" \
              --parameters GhcrPullToken="${EKS_GHCR_PULL_TOKEN}" \
              --parameters ApiImage="ghcr.io/${{ github.repository_owner }}/move37-api:${{ steps.meta.outputs.image_tag }}" \
              --parameters WebImage="ghcr.io/${{ github.repository_owner }}/move37-web:${{ steps.meta.outputs.image_tag }}" \
              --parameters DbImage="ghcr.io/${{ github.repository_owner }}/move37-db:${{ steps.meta.outputs.image_tag }}"
          fi
