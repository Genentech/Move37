name: Deploy Web Container

on:
  push:
    tags:
      - "v*"
    paths:
      - "src/move37/web/**"
      - ".github/workflows/deploy-web.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          IMAGE_TAG="${TAG#v}"

          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-b\..+$ ]]; then
            TARGET_BRANCH="dev"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-a\..+$ ]]; then
            TARGET_BRANCH="beta"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\..+$ ]]; then
            TARGET_BRANCH="rc"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TARGET_BRANCH="stable"
          else
            echo "Unsupported tag format: $TAG" >&2
            exit 1
          fi

          TAGS="ghcr.io/${{ github.repository_owner }}/move37-web:${IMAGE_TAG}"

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write release metadata artifact
        shell: bash
        run: |
          set -euo pipefail
          cat > deploy-web-metadata.json <<EOF
          {
            "tag": "${GITHUB_REF_NAME}",
            "image_tag": "${{ steps.meta.outputs.image_tag }}",
            "target_branch": "${{ steps.meta.outputs.target_branch }}"
          }
          EOF

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-web-metadata
          path: deploy-web-metadata.json
          retention-days: 3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/move37/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.image_tag }}
            VCS_REF=${{ github.sha }}
