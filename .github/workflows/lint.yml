name: Lint

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            ./devtools \
            -r src/move37/api/python-requirements.txt \
            -r src/move37/db/python-requirements.txt \
            -r src/move37/alembic/python-requirements.txt \
            httpx

      - name: Run Python tests
        env:
          PYTHONPATH: src
        run: |
          python -m unittest discover -s src/move37/tests -t src
          python -m unittest discover -s devtools/tests

  sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/move37/sdk/node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install SDK dependencies
        run: npm install

      - name: Run SDK tests
        run: npm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/move37/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies
        run: npm install

      - name: Build web app
        run: npm run build

  contributor-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contributing-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install contributor docs dependencies
        run: npm install

      - name: Build contributor docs
        run: npm run build
