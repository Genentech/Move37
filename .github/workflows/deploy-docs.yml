# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Automatic deployment trigger on version tags.
  # GitHub tag filters use glob syntax; exact format is validated in the metadata step.
  # Tag patterns determine target environment:
  # - v1.2.3-b.1  -> Development (branch builds)
  # - v1.2.3-a.1  -> Beta (alpha releases)
  # - v1.2.3-rc.1 -> Release Candidate
  # - v1.2.3      -> Stable/Production
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+-[a-z]+\.[0-9]+'
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Sphinx dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/sphinx/requirements.txt
      - name: Build Sphinx HTML docs
        run: |
          sphinx-build -b html docs/sphinx/src docs/sphinx/build/html
      - name: Add .nojekyll to artifact
        run: |
          touch docs/sphinx/build/html/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload built Sphinx site
          path: 'docs/sphinx/build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
