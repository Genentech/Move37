name: Deploy Contributor Docs

on:
  push:
    branches: [ stable ]
    paths:
      - "contributing-docs/**"
      - ".github/workflows/deploy-contributor-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-contributor-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contributing-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install contributor docs dependencies
        run: npm install

      - name: Build contributor docs
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: npm run build

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: contributing-docs/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
