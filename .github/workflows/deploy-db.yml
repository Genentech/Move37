name: Deploy DB Container

on:
  # Automatic deployment trigger on version tags.
  # GitHub tag filters use glob syntax; exact format is validated in the metadata step.
  # Tag patterns determine target environment:
  # - v1.2.3-b.1  -> Development (branch builds)
  # - v1.2.3-a.1  -> Beta (alpha releases)
  # - v1.2.3-rc.1 -> Release Candidate
  # - v1.2.3      -> Stable/Production
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
      - 'v[0-9]+\.[0-9]+\.[0-9]+-[a-z]+\.[0-9]+'
    paths:
      - 'src/penroselamarck/db/**'
      - 'src/penroselamarck/alembic.ini'
      - 'src/penroselamarck/alembic/**'
      - 'src/penroselamarck/core/**'
      - 'src/penroselamarck/models/**'
      - 'src/penroselamarck/schemas/**'
      - 'src/penroselamarck/repositories/**'
      - 'src/penroselamarck/services/**'
      - 'src/penroselamarck/__init__.py'
      - '.github/workflows/deploy-db.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/penrose-lamarck-pg
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/penroselamarck/db/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
