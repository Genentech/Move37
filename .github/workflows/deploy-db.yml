name: Deploy DB Container

on:
  push:
    tags:
      - "v*"
    paths:
      - "src/move37/db/**"
      - "src/move37/models/**"
      - "src/move37/repositories/**"
      - "src/move37/schemas/**"
      - "src/move37/services/**"
      - "src/move37/alembic.ini"
      - "src/move37/alembic/**"
      - "src/move37/default_graph.py"
      - "src/move37/bank_account.py"
      - "src/move37/calendar.py"
      - "src/move37/github.py"
      - "src/move37/__init__.py"
      - ".github/workflows/deploy-db.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          IMAGE_TAG="${TAG#v}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+(\.[0-9]+)?)?$ ]]; then
            echo "Unsupported tag format: $TAG" >&2
            exit 1
          fi

          TAGS="ghcr.io/${{ github.repository_owner }}/move37-db:${IMAGE_TAG}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/${{ github.repository_owner }}/move37-db:latest"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/move37/db/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
